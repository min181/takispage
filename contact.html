<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Taki's Apps</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header class="site-header">
        <nav class="nav">
            <a href="index.html" class="nav-brand">Home</a>
            <a href="contact.html" class="nav-contact" aria-current="page">Contact</a>
        </nav>

        <div class="hero">
            <p class="eyebrow">Taki's Apps</p>
            <h1>Contact</h1>
            <p class="tagline">Support, feedback, and inquiries for Taki's apps.</p>
        </div>
    </header>

    <main>
        <section>
            <h2>Contact Form</h2>
            <iframe data-tally-src="https://tally.so/embed/KYkGEV?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" loading="lazy" width="100%" height="579" frameborder="0" marginheight="0" marginwidth="0" title="Contact Form to Taki"></iframe>
            <script>
                var d = document;
                var w = "https://tally.so/widgets/embed.js";
                var v = function() {
                    if (typeof Tally !== "undefined") {
                        Tally.loadEmbeds();
                    } else {
                        d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach(function(e) {
                            e.src = e.dataset.tallySrc;
                        });
                    }
                };
                if (typeof Tally !== "undefined") {
                    v();
                } else if (d.querySelector('script[src="' + w + '"]') == null) {
                    var s = d.createElement("script");
                    s.src = w;
                    s.onload = v;
                    s.onerror = v;
                    d.body.appendChild(s);
                }
            </script>
        </section>
    </main>

    <footer>
        <p><a href="screen-palette.html">Back to Screen Palette</a></p>
        <p>&copy; 2026 Taki. Hosted on GitHub Pages.</p>
    </footer>
</div>

</body>
</html>
